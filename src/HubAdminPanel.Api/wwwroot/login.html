<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hub Admin Panel - Login</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/assets/vendor/css/core.css" />
    <link rel="stylesheet" href="/assets/css/demo.css" />
    <link rel="stylesheet" href="/assets/css/dark-theme.css" />
    <link rel="stylesheet" href="/assets/vendor/css/pages/page-auth.css" />

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/jwt-decode@3.1.2/build/jwt-decode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>

<body>
    <div class="authentication-wrapper authentication-basic container-p-y">
        <div class="authentication-inner py-6">
            <div class="card p-sm-7 p-2">
                <div class="card-body">
                    <div class="text-center mb-5">
                        <h4 class="mb-1">Hoş Geldiniz! 👋🏻</h4>
                        <p>Lütfen hesabınıza giriş yapın.</p>
                    </div>

                    <form id="formAuthentication">
                        <div class="form-floating form-floating-outline mb-5">
                            <input type="text" class="form-control" id="email" placeholder="Email veya kullanıcı adı" autofocus required />
                            <label for="email">Email veya Kullanıcı Adı</label>
                        </div>

                        <div class="mb-5">
                            <div class="form-floating form-floating-outline">
                                <input type="password" class="form-control" id="password" placeholder="············" required />
                                <label for="password">Şifre</label>
                            </div>
                        </div>

                        <div class="d-flex justify-content-between align-items-center mb-5">
                            <div class="form-check mb-0">
                                <input class="form-check-input" type="checkbox" id="remember-me" />
                                <label class="form-check-label" for="remember-me">Beni Hatırla</label>
                            </div>
                            <a href="auth-forgot-password-basic.html">Şifremi Unuttum?</a>
                        </div>

                        <button class="btn btn-primary d-grid w-100" type="submit">Giriş Yap</button>
                    </form>

                    <p class="text-center mt-5">
                        <span>Yeni misiniz?</span>
                        <a href="auth-register-basic.html">Hesap Oluştur</a>
                    </p>

                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const loginForm = document.getElementById('formAuthentication');
            if (!loginForm) return;

            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();

                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;

                try {
                    const response = await axios.post('https://localhost:7016/api/Auth/login', {
                        username: email,
                        password: password
                    });

                    const { accessToken } = response.data;

                    if (accessToken) {
                        const decoded = jwt_decode(accessToken);

                        const name = decoded["http://schemas.xmlsoap.org/ws/2005/05/identity/claims/name"] || decoded.unique_name || decoded.sub;
                        const role = decoded["http://schemas.xmlsoap.org/ws/2008/06/identity/claims/role"] || decoded.role;

                        console.log("Gelen Rol:", role);

                        if (role !== 'Admin') {
                            Swal.fire({
                                title: 'Erişim Engellendi',
                                text: 'Bu sisteme sadece yöneticiler giriş yapabilir.',
                                icon: 'error',
                                confirmButtonColor: '#696cff'
                            });
                            return; 
                        }

                        localStorage.setItem('accessToken', accessToken);
                        localStorage.setItem('username', name);
                        localStorage.setItem('userRole', role);

                        window.location.href = '/index.html';
                    }
                } catch (error) {
                    console.error("Hata:", error);
                    const errorMsg = error.response?.data || "Giriş bilgileri hatalı veya yetkiniz bulunmuyor.";

                    Swal.fire({
                        title: 'Hata!',
                        text: errorMsg,
                        icon: 'error',
                        confirmButtonColor: '#696cff'
                    });
                }
            });
        });
    </script>
</body>
</html>
